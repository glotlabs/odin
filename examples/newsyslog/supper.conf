# Rotate supper-managed application logs.
# Install as /usr/local/etc/newsyslog.conf.d/supper.conf on FreeBSD.
#
# logfilename                  owner:group  mode count size when  flags
/var/log/supper/*.out.log      root:wheel   640  7     10M  *     JC
/var/log/supper/*.err.log      root:wheel   640  7     10M  *     JC
