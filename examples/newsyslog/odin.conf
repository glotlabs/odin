# Rotate odin-managed application logs.
# Install as /usr/local/etc/newsyslog.conf.d/odin.conf on FreeBSD.
#
# logfilename                  owner:group  mode count size when  flags
/var/log/odin/*.out.log      root:wheel   640  7     10M  *     JC
/var/log/odin/*.err.log      root:wheel   640  7     10M  *     JC
